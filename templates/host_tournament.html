{% extends 'base.html' %}

{% block title %}Host Tournament{% endblock %}
{% block header_title %}❖ Host Tournament{% endblock %}

{% block content %}
<style>
.host-form-container {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    padding: 35px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: var(--glass-shadow);
    max-width: 800px;
    margin: 0 auto;
    box-sizing: border-box;
}

.host-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    margin-bottom: 25px;
}

@media (max-width: 768px) {
    .host-form-grid {
        grid-template-columns: 1fr;
    }
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-group label {
    font-weight: 500;
    color: var(--accent-primary);
    font-size: 0.95rem;
    letter-spacing: 0.5px;
}

.custom-input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    color: var(--text-main);
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    box-sizing: border-box;
}

.custom-input:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 15px rgba(14, 165, 233, 0.3), inset 0 2px 5px rgba(0,0,0,0.1);
    background: var(--input-focus-bg);
}

.custom-input option {
    background: var(--bg-dark);
    color: var(--text-main);
}

.custom-input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.radio-group {
    display: flex;
    gap: 20px;
    padding: 10px 0;
}

.radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-weight: 500;
}

.radio-label input[type="radio"] {
    accent-color: var(--accent-primary);
    width: 18px;
    height: 18px;
}

.submit-btn {
    width: 100%;
    padding: 16px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
    color: white;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
    margin-top: 10px;
}

.submit-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(14, 165, 233, 0.5);
    background: linear-gradient(135deg, #0284c7, #0369a1);
}
</style>

<div class="host-form-container">
    <form id="tournamentForm" enctype="multipart/form-data">
        
        <div class="host-form-grid">
            <!-- Tournament Name -->
            <div class="form-group" style="grid-column: span 2;">
                <label>Tournament Name</label>
                <input type="text" name="name" class="custom-input" placeholder="e.g. Champions Trophy 2026" required>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" name="date" class="custom-input" required>
            </div>

            <!-- Location -->
            <div class="form-group">
                <label>City Location</label>
                <input type="text" name="location" class="custom-input" placeholder="e.g. Mumbai" required>
            </div>

            <!-- Type -->
            <div class="form-group">
                <label>Format</label>
                <select name="type" id="type" class="custom-input" onchange="handleType()" required>
                    <option value="" disabled selected>Select Format...</option>
                    <option value="T20">T20 (20 Overs)</option>
                    <option value="ODI">ODI (50 Overs)</option>
                    <option value="OTHER">Custom Overs</option>
                </select>
            </div>

            <!-- Overs -->
            <div class="form-group">
                <label>Custom Overs</label>
                <input type="number" name="overs" id="overs" class="custom-input" placeholder="Enter Overs" disabled>
            </div>

            <!-- Match Type -->
            <div class="form-group">
                <label>Match Environment</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="match_type" value="GROUND" required> Full Ground
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="match_type" value="BOX"> Box Cricket
                    </label>
                </div>
            </div>

            <!-- Ball Type -->
            <div class="form-group">
                <label>Ball Type</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="ball_type" value="LEATHER" required> Leather
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="ball_type" value="TENNIS"> Tennis
                    </label>
                </div>
            </div>

            <!-- Logo -->
            <div class="form-group" style="grid-column: span 2;">
                <label>Tournament Logo (Optional)</label>
                <input type="file" name="logo" class="custom-input" accept=".png,.jpg,.jpeg">
            </div>
        </div>

        <button type="submit" class="submit-btn">🏆 Host Tournament</button>

    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
// Enable overs only for OTHER
function handleType() {
    const type = document.getElementById("type").value;
    const overs = document.getElementById("overs");

    if (type === "OTHER") {
        overs.disabled = false;
        overs.focus();
    } else {
        overs.disabled = true;
        overs.value = "";
    }
}

// Submit form
document.getElementById("tournamentForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch("/create-tournament", {
        method: "POST",
        body: formData
    })
    .then(async res => {
        let data;
        try {
            data = await res.json();
        } catch (err) {
            console.error("❌ Not JSON:", err);
            throw new Error("Server returned invalid response");
        }

        if (!res.ok) {
            console.error("❌ Backend Error:", data);
            alert(data.error || "Something went wrong");
            return;
        }

        alert(data.message);
        window.location.href = "/tourney";
    })
    .catch(err => {
        console.error("❌ Fetch Error:", err);
    });
});
</script>
{% endblock %}
