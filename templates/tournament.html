{% extends 'base.html' %}

{% block title %}Tournaments{% endblock %}
{% block header_title %}🏆 Tournaments{% endblock %}

{% block content %}
<style>
    .toolbar-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
    }

    @media (max-width: 768px) {
        .toolbar-grid {
            grid-template-columns: 1fr;
        }
    }

    .glass-panel {
        background: var(--bg-card);
        backdrop-filter: var(--glass-blur);
        padding: 25px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: var(--glass-shadow);
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .custom-input {
        width: 100%;
        padding: 14px 20px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        color: var(--text-main);
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
        box-sizing: border-box;
    }

    .custom-input:focus {
        border-color: var(--accent-primary);
        box-shadow: 0 0 15px rgba(14, 165, 233, 0.3), inset 0 2px 5px rgba(0, 0, 0, 0.1);
        background: var(--input-focus-bg);
    }

    .submit-btn {
        padding: 14px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
        color: white;
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.3s ease;
        box-shadow: 0 8px 15px rgba(14, 165, 233, 0.3);
        width: 100%;
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 20px rgba(14, 165, 233, 0.5);
    }

    .submit-btn.alt {
        background: linear-gradient(135deg, var(--accent-secondary), #059669);
        color: white;
        box-shadow: 0 8px 15px rgba(16, 185, 129, 0.3);
    }

    /* Tournament Card */
    .tourney-card {
        background: var(--bg-card);
        backdrop-filter: var(--glass-blur);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.4s ease;
    }

    .tourney-card:hover {
        transform: translateX(10px);
        border-color: var(--accent-primary);
        box-shadow: -5px 10px 20px rgba(0, 0, 0, 0.4);
    }

    .tourney-info h4 {
        margin: 0 0 10px 0;
        color: var(--accent-primary);
        font-size: 1.4rem;
    }

    .tourney-info p {
        margin: 5px 0;
        color: var(--text-main);
        font-size: 0.95rem;
    }

    .tourney-logo-box {
        width: 120px;
        height: 120px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px dashed var(--border-color);
        overflow: hidden;
        margin-left: 20px;
    }

    .tourney-logo-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* MODAL */
    .glass-modal-bg {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .glass-modal {
        background: var(--bg-sidebar);
        border: 1px solid var(--border-color);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 500px;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
    }

    .modal-results {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        max-height: 200px;
        overflow-y: auto;
        margin-bottom: 20px;
        text-align: left;
        border: 1px solid var(--border-color);
    }

    .modal-results div {
        padding: 12px 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        cursor: pointer;
        transition: background 0.2s;
    }

    .modal-results div:hover {
        background: var(--accent-primary);
        color: white;
    }
</style>

<!-- ================= TOOLBAR ================= -->
<div class="toolbar-grid">
    <div class="glass-panel">
        <h4 style="margin: 0 0 15px 0;">🔍 Search Tournament</h4>
        <input type="text" class="custom-input" placeholder="Search by Tournament ID or Name (coming soon)">
    </div>

    <div class="glass-panel" style="text-align: center;">
        <h4 style="margin: 0 0 15px 0;">Want to host a tournament?</h4>
        <button class="submit-btn alt" onclick="goToHost()">➕ Host Tournament</button>
    </div>
</div>

<!-- ================= NAV TAB ================= -->
<div class="nav-toggle" style="margin: 30px 0 20px 0; width: 100%;">
    <input type="radio" class="btn-check" name="tourneyNav" id="upcomingBtn" checked>
    <label class="btn-toggle" for="upcomingBtn" onclick="renderTournaments('upcoming')">Upcoming</label>

    <input type="radio" class="btn-check" name="tourneyNav" id="ongoingBtn">
    <label class="btn-toggle" for="ongoingBtn" onclick="renderTournaments('ongoing')">Ongoing</label>

    <input type="radio" class="btn-check" name="tourneyNav" id="completedBtn">
    <label class="btn-toggle" for="completedBtn" onclick="renderTournaments('completed')">Completed</label>
</div>

<!-- ================= LIST ================= -->
<div id="tournamentList"></div>
<!-- ================= JOIN MODAL ================= -->
<div id="joinModal" class="glass-modal-bg">
    <div class="glass-modal">
        <h3 style="color: var(--accent-primary); margin-top:0; margin-bottom: 20px;">Select Team to Join</h3>

        <input type="text" id="teamSearch" placeholder="Search Team..." class="custom-input mb-2">

        <div id="teamResults" class="modal-results"></div>

        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="submit-btn" onclick="confirmJoin()">Join</button>
            <button class="submit-btn" style="background: rgba(255,255,255,0.1); box-shadow: none;"
                onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>

    let allTeams = [];
    let selectedTeamId = null;
    let currentTournamentId = null;
    let clickedButton = null;

    // ================= REDIRECT =================
    function goToHost() {
        window.location.href = "/host-tournament";
    }

    let globalTournaments = [];
    let globalRegistrations = [];

    // ================= LOAD TOURNAMENTS =================
    function loadTournaments() {

        Promise.all([
            fetch("/tournaments").then(res => res.json()),
            fetch("/my-registrations").then(res => res.json())
        ])
            .then(([tournaments, registrations]) => {
                globalTournaments = tournaments;
                globalRegistrations = registrations.map(r => r.tournament_id);
                renderTournaments('upcoming');
            })
            .catch(err => console.error("❌ Load Error:", err));
    }

    function renderTournaments(filter) {
        let div = document.getElementById("tournamentList");
        div.innerHTML = "";

        let filtered = [];
        if (filter === 'upcoming') {
            filtered = globalTournaments.filter(t => !t.is_started && !t.is_completed);
        } else if (filter === 'ongoing') {
            filtered = globalTournaments.filter(t => t.is_started && !t.is_completed);
        } else if (filter === 'completed') {
            filtered = globalTournaments.filter(t => t.is_completed);
        }

        if (filtered.length === 0) {
            div.innerHTML = `<p style='color: var(--text-muted); padding: 20px; text-align: center;'>No ${filter} tournaments available right now.</p>`;
            return;
        }

        filtered.forEach(t => {
            let isRegistered = globalRegistrations.includes(t.tournament_id);
            let actionBtn = "";

            if (filter === 'upcoming') {
                actionBtn = isRegistered
                    ? `<button class="submit-btn" style="opacity:0.5; pointer-events:none; max-width: 150px; padding: 10px; font-size: 0.9rem;">Registered</button>`
                    : `<button class="submit-btn alt" style="max-width: 150px; padding: 10px; font-size: 0.9rem;"
                        onclick="joinTournament(${t.tournament_id}, this)">
                        Join Now
                   </button>`;
            } else if (filter === 'ongoing') {
                actionBtn = `<button class="submit-btn alt" style="max-width: 150px; padding: 10px; font-size: 0.9rem;"
                            onclick="window.location.href='/tournament/${t.tournament_id}/matches'">
                            View Matches
                       </button>`;
            } else if (filter === 'completed') {
                actionBtn = `<button class="submit-btn" style="max-width: 150px; padding: 10px; font-size: 0.9rem;"
                            onclick="window.location.href='/tournament/${t.tournament_id}/matches'">
                            🏅 View Results
                       </button>`;
            }

            div.innerHTML += `
            <div class="tourney-card">
                <div class="tourney-info">
                    <h4>${t.tournament_name}</h4>
                    <p><strong>ID:</strong> #${t.tournament_id}</p>
                    
                    <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin: 10px 0; max-width: 300px;">
                        <p style="margin:0;"><strong>Hosted By:</strong> ${t.host_name}</p>
                        <p style="margin:0;"><strong>Contact:</strong> ${t.host_mobile}</p>
                    </div>

                    ${actionBtn}
                </div>
                <div class="tourney-logo-box">
                    ${t.logo ? `<img src="/static/uploads/${t.logo}">` : `<span style="color: var(--text-muted); font-size: 0.8rem;">No Logo</span>`}
                </div>
            </div>
        `;
        });
    }

    // ================= OPEN MODAL =================
    function joinTournament(tournamentId, btn) {

        currentTournamentId = tournamentId;
        clickedButton = btn;

        const modal = document.getElementById("joinModal");
        modal.style.display = "flex";

        fetch("/my-teams")
            .then(res => res.json())
            .then(data => {
                allTeams = data;
            })
            .catch(err => console.error("❌ Team Load Error:", err));
    }

    // ================= CLOSE =================
    function closeModal() {
        document.getElementById("joinModal").style.display = "none";
    }

    // ================= SEARCH TEAM =================
    document.getElementById("teamSearch").addEventListener("input", function () {

        const query = this.value.toLowerCase();
        const resultsDiv = document.getElementById("teamResults");
        resultsDiv.innerHTML = "";

        if (!query) return;

        const filtered = allTeams.filter(t =>
            t.team_name.toLowerCase().includes(query)
        );

        filtered.forEach(team => {

            const div = document.createElement("div");

            div.innerText = `${team.team_name} (ID: ${team.team_id}) - Captain: ${team.captain_name}`;

            div.onclick = () => {
                selectedTeamId = team.team_id;
                document.getElementById("teamSearch").value = team.team_name;
                resultsDiv.innerHTML = "";
            };

            resultsDiv.appendChild(div);
        });
    });

    // ================= CONFIRM JOIN =================
    function confirmJoin() {

        if (!selectedTeamId) {
            alert("Select a team");
            return;
        }

        fetch("/join-tournament", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                tournament_id: currentTournamentId,
                team_id: selectedTeamId
            })
        })
            .then(async res => {

                let data;

                try {
                    data = await res.json();
                } catch (err) {
                    console.error("❌ Invalid JSON:", err);
                    return;
                }

                if (!res.ok) {
                    console.error("❌ Backend Error:", data);
                    alert(data.error || "Error");
                    return;
                }

                alert(data.message);

                closeModal();

                // update button
                clickedButton.innerText = "Registered";
                clickedButton.disabled = true;
                clickedButton.style.opacity = "0.5";
                clickedButton.style.background = "linear-gradient(135deg, var(--accent-primary), var(--accent-hover))";
            })
            .catch(err => console.error("❌ Join Error:", err));
    }

    // ================= AUTO LOAD =================
    loadTournaments();

</script>
{% endblock %}
