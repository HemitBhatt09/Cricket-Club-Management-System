<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Database ER Diagram</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        #erd {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }
        svg {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: block;
        }
        h1 {
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Cricket Club Management System Database ER Diagram</h1>
    <div id="erd"></div>

    <script type="module">
        import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
        
        const dark = matchMedia('(prefers-color-scheme: dark)').matches;
        await document.fonts.ready;
        
        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            fontFamily: 'Arial, sans-serif',
            themeVariables: {
                darkMode: dark,
                fontSize: '12px',
                fontFamily: 'Arial, sans-serif',
                lineColor: '#000',
                textColor: '#000',
                primaryColor: '#fff',
                primaryTextColor: '#000',
                primaryBorderColor: '#000',
                secondaryColor: '#fff',
                tertiaryColor: '#fff',
            },
        });

        const diagram = `erDiagram
  USERS {
    int user_id PK
    string name
    string mobile_no UK
    string password
    string role
    string profile_pic
  }
  TEAMS {
    int team_id PK
    string team_name
    int created_by FK
  }
  TEAM_MEMBERS {
    int team_id FK
    int user_id FK
    int is_captain
    int is_vice_captain
  }
  TOURNAMENTS {
    int tournament_id PK
    string tournament_name
    int hosted_by FK
    date tournament_date
    string tournament_type
    int overs
    string match_type
    string ball_type
    string location
    string logo
    string host_name
    string host_mobile
    int is_started
    int is_completed
    int man_of_tournament_id
  }
  TOURNAMENT_TEAMS {
    int tournament_id FK
    int team_id FK
    int joined_by
    string status
  }
  MATCHES {
    int match_id PK
    int team1_id FK
    int team2_id FK
    string match_date
    int created_by FK
    int tournament_id FK
    string match_type
    int is_finalized
    int team1_score
    int team2_score
    int team1_extras
    int team2_extras
    int is_completed
    int team1_wickets
    int team2_wickets
    float team1_overs
    float team2_overs
    int team1_summary_done
    int team2_summary_done
    int toss_winner_id
    string toss_decision
    int total_overs
    int current_innings
    int is_started
    string winner
    string stage
    int man_of_the_match
  }
  MATCH_PLAYERS {
    int id PK
    int match_id FK
    int team_id FK
    int user_id FK
  }
  BALL_BY_BALL {
    int ball_id PK
    int match_id FK
    int innings
    int over_number
    int ball_number
    int batting_team_id FK
    int bowling_team_id FK
    int striker_id FK
    int non_striker_id FK
    int bowler_id FK
    int runs_scored
    string extra_type
    int extra_runs
    int is_wicket
    string wicket_type
    int fielder_id FK
  }
  CURRENT_MATCH_STATE {
    int match_id PK
    int innings
    int striker_id
    int non_striker_id
    int bowler_id
    int last_bowler_id
    int total_runs
    int total_wickets
    int current_over
    int current_ball
  }
  DISMISSED_PLAYERS {
    int id PK
    int match_id FK
    int player_id FK
  }
  PLAYER_PERFORMANCE {
    int id PK
    int match_id FK
    int team_id FK
    int user_id FK
    int runs
    int balls
    float overs
    int runs_conceded
    int wickets
  }
  POINTS_TABLE {
    int id PK
    int tournament_id FK
    int team_id FK
    int matches_played
    int wins
    int losses
    int points
    int runs_scored
    float overs_faced
    int runs_conceded
    float overs_bowled
  }

    USERS ||--o{ TEAMS : "1:M creates"
  USERS ||--o{ TEAM_MEMBERS : "1:M belongs to"
  TEAMS ||--o{ TEAM_MEMBERS : "1:M has"
  USERS ||--o{ TOURNAMENTS : "1:M hosts"
  TOURNAMENTS ||--o{ TOURNAMENT_TEAMS : "1:M includes"
  TEAMS ||--o{ TOURNAMENT_TEAMS : "M:N joins"
  TEAMS ||--o{ MATCHES : "1:M plays as team1"
  TEAMS ||--o{ MATCHES : "1:M plays as team2"
  USERS ||--o{ MATCHES : "1:M creates"
  TOURNAMENTS ||--o{ MATCHES : "1:M has"
  MATCHES ||--o{ MATCH_PLAYERS : "1:M registers"
  TEAMS ||--o{ MATCH_PLAYERS : "1:M in"
  USERS ||--o{ MATCH_PLAYERS : "1:M plays in"
  MATCHES ||--o{ BALL_BY_BALL : "1:M has"
  TEAMS ||--o{ BALL_BY_BALL : "1:M bats/bowls in"
  USERS ||--o{ BALL_BY_BALL : "M:N delivers/faces"
  MATCHES ||--|| CURRENT_MATCH_STATE : "1:1 tracks"
  MATCHES ||--o{ DISMISSED_PLAYERS : "1:M records"
  USERS ||--o{ DISMISSED_PLAYERS : "1:M dismissed in"
  MATCHES ||--o{ PLAYER_PERFORMANCE : "1:M captures"
  TEAMS ||--o{ PLAYER_PERFORMANCE : "1:M contributes"
  USERS ||--o{ PLAYER_PERFORMANCE : "1:M performs in"
  TOURNAMENTS ||--o{ POINTS_TABLE : "1:M tracked in"
  TEAMS ||--o{ POINTS_TABLE : "1:M ranked in"


`;

        const { svg } = await mermaid.render('erd-svg', diagram);
        document.getElementById('erd').innerHTML = svg;

        setTimeout(() => {
            document.querySelectorAll('#erd svg .edgeLabel tspan').forEach(tspan => {
                tspan.style.fontWeight = 'bold';
                tspan.style.fontSize = '13px';
                tspan.style.fill = '#000';
            });
        }, 500);
    </script>
</body>
</html>
